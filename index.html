<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Country Info App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #ffffff;
    }

    p.subtitle {
      color: #888;
      margin-bottom: 32px;
      font-size: 14px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
      width: 100%;
      max-width: 500px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    input:focus { border-color: #555; }

    button {
      padding: 12px 24px;
      background: #ffffff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: #ddd; }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      display: none;
    }

    .card.visible { display: block; }

    .flag {
      font-size: 72px;
      text-align: center;
      margin-bottom: 16px;
    }

    .country-name {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 24px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 14px;
    }

    .info-row:last-child { border-bottom: none; }
    .label { color: #888; }
    .value { color: #fff; font-weight: 500; }

    .error {
      color: #ff6b6b;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }

    .loading {
      color: #888;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>🌍 Country Info</h1>
  <p class="subtitle">Type a country name to get live data</p>

  <div class="search-box">
    <input type="text" id="countryInput" placeholder="e.g. India, Japan, Brazil" />
    <button onclick="getCountry()">Search</button>
  </div>

  <p class="loading" id="loading">Fetching data...</p>
  <p class="error" id="error">Country not found. Try again.</p>

  <div class="card" id="card">
    <div class="flag" id="flag"></div>
    <div class="country-name" id="name"></div>
    <div class="info-row">
      <span class="label">Capital</span>
      <span class="value" id="capital"></span>
    </div>
    <div class="info-row">
      <span class="label">Population</span>
      <span class="value" id="population"></span>
    </div>
    <div class="info-row">
      <span class="label">Region</span>
      <span class="value" id="region"></span>
    </div>
    <div class="info-row">
      <span class="label">Currency</span>
      <span class="value" id="currency"></span>
    </div>
    <div class="info-row">
      <span class="label">Language</span>
      <span class="value" id="language"></span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
